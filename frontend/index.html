<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gestión de Usuarios - Santana</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f9;margin:0;padding:30px}
.container{max-width:1100px;margin:auto;display:grid;grid-template-columns:350px 1fr;gap:20px}
.card,.tablebox{background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
input{width:100%;padding:10px;margin:6px 0 12px;box-sizing:border-box}
button{padding:10px 14px;border:none;border-radius:6px;cursor:pointer;background:#4f46e5;color:#fff}
#btnCancelar{display:none;background:#666}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ddd}
.actions button{margin-right:5px}
</style>
</head>
<body>
<div class="container">
<div class="card">
<h2 id="formTitle">Nuevo Registro</h2>
<form id="formRegistro">
<input type="hidden" id="userId">
<label>Cédula</label><input id="cedula" required>
<label>Nombre</label><input id="nombre" required>
<label>Email</label><input id="email" type="email" required>
<label>Edad</label><input id="edad" type="number" required>
<label>Ciudad</label><input id="ciudad" required>
<label>Teléfono</label><input id="telefono" required>
<button id="btnSubmit" type="submit">Guardar Registro</button>
<button id="btnCancelar" type="button" onclick="resetForm()">Cancelar</button>
</form>
<p id="mensaje"></p>
</div>
<div class="tablebox">
<h2>Usuarios</h2>
<table>
<thead><tr><th>Cédula</th><th>Nombre</th><th>Email</th><th>Edad</th><th>Ciudad</th><th>Teléfono</th><th>Acciones</th></tr></thead>
<tbody id="tablaUsuarios"></tbody>
</table>
</div>
</div>
<script>
const API="https://backsantana.byronrm.com";
const BACKEND_URL=`${API}/usuarios`;
const mensaje=document.getElementById("mensaje");
const tbody=document.getElementById("tablaUsuarios");
document.addEventListener("DOMContentLoaded",()=>{
 document.getElementById("formRegistro").addEventListener("submit",guardar);
 obtenerUsuarios();
});
function mostrar(t,e=false){mensaje.textContent=t;mensaje.style.color=e?"red":"green";setTimeout(()=>mensaje.textContent="",3000);}
async function obtenerUsuarios(){
 tbody.innerHTML="<tr><td colspan='7'>Cargando...</td></tr>";
 try{
  const r=await fetch(BACKEND_URL); const users=await r.json(); tbody.innerHTML="";
  if(users.length===0){tbody.innerHTML="<tr><td colspan='7'>Sin registros</td></tr>";return;}
  users.forEach(u=>{
   const tr=document.createElement("tr");
   tr.innerHTML=`<td>${u.cedula}</td><td>${u.nombre}</td><td>${u.email}</td><td>${u.edad}</td><td>${u.ciudad}</td><td>${u.telefono}</td>
   <td class="actions"><button class="e">Editar</button><button class="d">Borrar</button></td>`;
   tr.querySelector(".e").onclick=()=>prepararEdicion(u);
   tr.querySelector(".d").onclick=()=>eliminarUsuario(u.id);
   tbody.appendChild(tr);
  });
 }catch(e){tbody.innerHTML="<tr><td colspan='7'>Error</td></tr>";}
}
async function guardar(ev){
 ev.preventDefault();
 const id=userId.value;
 const datos={cedula:cedula.value,nombre:nombre.value,email:email.value,edad:+edad.value,ciudad:ciudad.value,telefono:telefono.value};
 const r=await fetch(id?`${BACKEND_URL}/${id}`:BACKEND_URL,{method:id?"PUT":"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(datos)});
 const j=await r.json();
 if(r.ok){mostrar("Guardado");resetForm();obtenerUsuarios();}else mostrar(j.error||"Error",true);
}
async function eliminarUsuario(id){if(!confirm("Eliminar?"))return;await fetch(`${BACKEND_URL}/${id}`,{method:"DELETE"});obtenerUsuarios();}
function prepararEdicion(u){
userId.value=u.id;cedula.value=u.cedula;nombre.value=u.nombre;email.value=u.email;edad.value=u.edad;ciudad.value=u.ciudad;telefono.value=u.telefono;
formTitle.textContent="Editar Registro";btnSubmit.textContent="Actualizar";btnCancelar.style.display="inline-block";
}
function resetForm(){formRegistro.reset();userId.value="";formTitle.textContent="Nuevo Registro";btnSubmit.textContent="Guardar Registro";btnCancelar.style.display="none";}
</script>
</body></html>
