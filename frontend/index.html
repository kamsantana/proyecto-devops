<script>
const API = "https://backsantana.byronrm.com";
const BACKEND_URL = `${API}/usuarios`;

const mensajeDiv = document.getElementById("mensaje");
const tbody = document.getElementById("tablaUsuarios");

document.addEventListener("DOMContentLoaded", obtenerUsuarios);

function mostrarMensaje(texto, error = false) {
    mensajeDiv.innerHTML = texto;
    mensajeDiv.style.color = error ? "#ef4444" : "#10b981";

    setTimeout(() => {
        mensajeDiv.innerHTML = "";
    }, 3000);
}

function limpiarFormulario() {
    document.getElementById("formRegistro").reset();
    document.getElementById("userId").value = "";

    document.getElementById("formTitle").innerHTML = "Nuevo Registro";
    document.getElementById("btnSubmit").innerHTML = "Guardar Registro";
    document.getElementById("btnCancelar").style.display = "none";
}

async function obtenerUsuarios() {

    tbody.innerHTML = `
        <tr>
            <td colspan="7" style="text-align:center">
                Cargando usuarios...
            </td>
        </tr>
    `;

    try {

        const respuesta = await fetch(BACKEND_URL);

        if (!respuesta.ok)
            throw new Error("No fue posible conectar.");

        const usuarios = await respuesta.json();

        tbody.innerHTML = "";

        if (usuarios.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="7" style="text-align:center">
                        No existen registros.
                    </td>
                </tr>
            `;
            return;
        }

        usuarios.forEach(usuario => {

            const fila = document.createElement("tr");

            fila.innerHTML = `
                <td>${usuario.cedula}</td>
                <td>${usuario.nombre}</td>
                <td>${usuario.email}</td>
                <td>${usuario.edad}</td>
                <td>${usuario.ciudad}</td>
                <td>${usuario.telefono}</td>

                <td class="actions">

                    <button class="btn-table btn-edit">
                        Editar
                    </button>

                    <button class="btn-table btn-delete">
                        Borrar
                    </button>

                </td>
            `;

            fila.querySelector(".btn-edit").onclick = () => prepararEdicion(usuario);

            fila.querySelector(".btn-delete").onclick = () => eliminarUsuario(usuario.id);

            tbody.appendChild(fila);

        });

    } catch (error) {

        tbody.innerHTML = `
            <tr>
                <td colspan="7" style="text-align:center;color:red">
                    Error al conectar con el servidor.
                </td>
            </tr>
        `;

    }

}

document.getElementById("formRegistro").addEventListener("submit", async function(e){

    e.preventDefault();

    const boton = document.getElementById("btnSubmit");

    boton.disabled = true;

    const id = document.getElementById("userId").value;

    const datos = {

        cedula: document.getElementById("cedula").value.trim(),
        nombre: document.getElementById("nombre").value.trim(),
        email: document.getElementById("email").value.trim(),
        edad: parseInt(document.getElementById("edad").value),
        ciudad: document.getElementById("ciudad").value.trim(),
        telefono: document.getElementById("telefono").value.trim()

    };

    if(Object.values(datos).some(v => v === "" || v === null || Number.isNaN(v))){
        mostrarMensaje("Complete todos los campos.", true);
        boton.disabled = false;
        return;
    }

    const metodo = id ? "PUT" : "POST";
    const url = id ? `${BACKEND_URL}/${id}` : BACKEND_URL;

    try{

        const respuesta = await fetch(url,{

            method: metodo,

            headers:{
                "Content-Type":"application/json"
            },

            body: JSON.stringify(datos)

        });

        const resultado = await respuesta.json();

        if(!respuesta.ok)
            throw new Error(resultado.error);

        mostrarMensaje(id ? "Usuario actualizado." : "Usuario registrado.");

        limpiarFormulario();

        obtenerUsuarios();

    }catch(error){

        mostrarMensaje(error.message,true);

    }

    boton.disabled = false;

});

async function eliminarUsuario(id){

    if(!confirm("¿Desea eliminar este usuario?"))
        return;

    try{

        const respuesta = await fetch(`${BACKEND_URL}/${id}`,{

            method:"DELETE"

        });

        if(!respuesta.ok)
            throw new Error();

        mostrarMensaje("Usuario eliminado.");

        obtenerUsuarios();

    }catch{

        mostrarMensaje("No fue posible eliminar.",true);

    }

}

function prepararEdicion(usuario){

    document.getElementById("userId").value = usuario.id;
    document.getElementById("cedula").value = usuario.cedula;
    document.getElementById("nombre").value = usuario.nombre;
    document.getElementById("email").value = usuario.email;
    document.getElementById("edad").value = usuario.edad;
    document.getElementById("ciudad").value = usuario.ciudad;
    document.getElementById("telefono").value = usuario.telefono;

    document.getElementById("formTitle").innerHTML = "Editar Registro";
    document.getElementById("btnSubmit").innerHTML = "Actualizar";
    document.getElementById("btnCancelar").style.display = "block";

}

function resetForm(){

    limpiarFormulario();

}
</script>
